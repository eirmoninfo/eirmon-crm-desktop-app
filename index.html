<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="%BASE_URL%eirmon_ai_logo.png" />
    <link rel="apple-touch-icon" href="%BASE_URL%eirmon_ai_logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem("erimon.theme");
          document.documentElement.setAttribute(
            "data-theme",
            t === "light" ? "light" : "dark"
          );
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <title>Erimon CRM</title>
  </head>
  <body>
    <div id="root">
      <div class="app-loading app-boot-splash" aria-live="polite" aria-busy="true">
        <div class="app-loading-logo-wrap">
          <div class="app-loading-spinner" aria-hidden="true"></div>
          <img
            src="%BASE_URL%eirmon_ai_logo.png"
            alt="Erimon CRM"
            width="72"
            height="72"
            class="app-loading-logo app-loading-logo-pulse"
          />
        </div>
        <p class="app-loading-text">Loading Erimon CRM…</p>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
